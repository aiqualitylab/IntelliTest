name: IntelliTest CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: --shm-size=2gb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Wait for Selenium
        run: |
          for i in {1..30}; do
            curl -sS http://localhost:4444/status | grep -q '"ready":true' && break
            sleep 2
          done

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
        run: dotnet test IntelliTest.csproj --no-build --configuration Release
        continue-on-error: true

      - name: Find NDJSON
        run: find . -name "LivingDoc.html"

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LivingDoc
          path: ./bin/Release/net9.0/TestResults/LivingDoc.html
          retention-days: 30
